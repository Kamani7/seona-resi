<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEONA RESI — Résidences & maisons à louer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ... (styles existants) ... */
  
  /* Ajout de styles pour les menus admin */
  .admin-menu {
    background: var(--ink);
    border-radius: var(--radius);
    padding: 8px 0;
    margin-bottom: 20px;
  }
  .admin-menu-item {
    padding: 10px 20px;
    color: var(--panel);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #3A4A45;
    transition: background 0.15s ease;
  }
  .admin-menu-item:hover {
    background: #3A4A45;
  }
  .admin-menu-item:last-child {
    border-bottom: none;
  }
  .admin-menu-item .arrow {
    margin-left: auto;
    transition: transform 0.2s ease;
  }
  .admin-menu-item.open .arrow {
    transform: rotate(90deg);
  }
  .admin-submenu {
    background: #2A3D37;
    padding: 4px 0;
    display: none;
  }
  .admin-submenu.open {
    display: block;
  }
  .admin-submenu-item {
    padding: 8px 20px 8px 40px;
    color: #C9C4AE;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s ease;
  }
  .admin-submenu-item:hover {
    background: #3A4A45;
    color: var(--panel);
  }
  .admin-submenu-item.active {
    color: var(--gold);
  }
  
  /* Tableaux admin */
  .admin-table-wrap {
    overflow-x: auto;
    margin-top: 10px;
  }
  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .admin-table th {
    background: var(--ink);
    color: var(--panel);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
  }
  .admin-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .admin-table tr:hover td {
    background: #FBFAF4;
  }
  .admin-table .actions {
    display: flex;
    gap: 6px;
  }
  .admin-table .actions button {
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .admin-table .actions button.edit:hover {
    border-color: var(--teal);
    color: var(--teal);
  }
  .admin-table .actions button.delete:hover {
    border-color: var(--clay);
    color: var(--clay);
  }
  .admin-table .actions button.validate {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
  }
  .admin-table .actions button.validate:hover {
    background: #2C574C;
  }
  
  .badge-status {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-status.validated {
    background: #E4F0EC;
    color: var(--teal);
  }
  .badge-status.pending {
    background: #F3E3C9;
    color: #8A5A12;
  }
  .badge-status.reserved {
    background: #F3E3C9;
    color: var(--clay);
  }
  
  .admin-content {
    display: none;
  }
  .admin-content.active {
    display: block;
  }
  
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .filter-bar input, .filter-bar select {
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .filter-bar input:focus, .filter-bar select:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
  }
  
  .transfer-form {
    max-width: 400px;
  }
  .transfer-form .form-field {
    margin-bottom: 12px;
  }
  .transfer-form .form-field label {
    font-size: 12px;
    font-weight: 600;
    color: #6B6A5A;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 4px;
  }
  .transfer-form .form-field input,
  .transfer-form .form-field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
</style>
</head>
<body>

}

// Fonction pour générer un ID unique

// === RENDER ADMIN DASHBOARD AVEC MENUS ===

  dashContent.innerHTML = `

  document.getElementById('dashCloseA').addEventListener('click', closeDash);

function renderRapportActivite() {
  const totalReservations = reservationsLog.length;
  const totalRevenue = reservationsLog.reduce((sum, r) => sum + (r.due || 0), 0);
  const totalCommission = reservationsLog.reduce((sum, r) => sum + (r.fee || 0), 0);
  const totalOwner = reservationsLog.reduce((sum, r) => sum + (r.ownerNet || 0), 0);
  const totalWallet = Object.values(adminWallet).reduce((a,b) => a + b, 0);
  
  return `
    <div style="margin-top: 10px;">
      <h4 style="font-family:'Fraunces',serif;font-size:16px;margin-bottom:12px;">Rapport d'activité</h4>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px;">
        <div class="wallet-card">
          <div class="op">Total Réservations</div>
          <div class="amt">${totalReservations}</div>
        </div>
        <div class="wallet-card">
          <div class="op">Chiffre d'affaires</div>
          <div class="amt">${money(totalRevenue)}</div>
        </div>
        <div class="wallet-card">
          <div class="op">Commissions totales</div>
          <div class="amt">${money(totalCommission)}</div>
        </div>
        <div class="wallet-card">
          <div class="op">Reversé aux propriétaires</div>
          <div class="amt">${money(totalOwner)}</div>
        </div>
        <div class="wallet-card">
          <div class="op">Portefeuille admin</div>
          <div class="amt">${money(totalWallet)}</div>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Mois</th>
              <th>Réservations</th>
              <th>CA</th>
              <th>Commission</th>
            </tr>
          </thead>
          <tbody>
            ${generateMonthlyReport().map(m => `
              <tr>
                <td>${m.month}</td>
                <td>${m.count}</td>
                <td>${money(m.revenue)}</td>
                <td>${money(m.commission)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function generateMonthlyReport() {
  const months = {};
  reservationsLog.forEach(r => {
    const date = new Date(r.dateStr);
    const key = date.getMonth() + '/' + date.getFullYear();
    if (!months[key]) months[key] = { month: key, count: 0, revenue: 0, commission: 0 };
    months[key].count++;
    months[key].revenue += r.due || 0;
    months[key].commission += r.fee || 0;
  });
  return Object.values(months).sort((a,b) => a.month.localeCompare(b.month));
}

                  <td>${money(c.amount)}</td>
                  <td>${c.operator}</td>

        </div>
      `}
    </div>

}

          <label>Opérateur</label>
          <select id="transferOperator">
            <option value="orange">Orange Monnaie</option>

            <option value="moov">Moov Monnaie</option>

          <input type="number" id="transferAmount" min="1" placeholder="0">

        <div class="form-field">

function renderHistoriqueTransfert() {
  return `

      ${transferHistory.length === 0 ? '<div class="empty-note">Aucun transfert effectué.</div>' : `
